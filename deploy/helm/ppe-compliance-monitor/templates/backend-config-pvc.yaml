{{- if and .Values.backend.configStorage .Values.backend.configStorage.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ppe-compliance-monitor.fullname" . }}-backend-config
  labels:
    {{- include "ppe-compliance-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-config
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backend.configStorage.size | default "1Gi" }}
{{- end }}
