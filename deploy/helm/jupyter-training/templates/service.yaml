{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "jupyter-training.fullname" . }}
  labels:
    {{- include "jupyter-training.labels" . | nindent 4 }}
    app.kubernetes.io/component: jupyter
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "jupyter-training.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: jupyter
{{- end }}
