version: "3.8"

networks:
  ppe:


services:
  minio:
    image: docker.io/minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001" # MinIO Console port
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_SERVER_URL=http://minio:9000
    command: server /data --console-address ":9001"
    networks:
      - ppe
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - minio_data:/data
    pull_policy: missing

  # PostgreSQL database for tracking data persistence
  postgresql:
    image: docker.io/library/postgres@sha256:93d55776e04376e19adb2733e3ccebb4392ee7dd86d8ff238503b30fe719c84f
    container_name: postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ppe_tracking
      POSTGRES_USER: ppe_user
      POSTGRES_PASSWORD: ppe_password
    networks:
      - ppe
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppe_user -d ppe_tracking"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    pull_policy: missing

  # Postgres MCP server (read-only access for the LLM agent)
  postgres-mcp:
    image: docker.io/crystaldba/postgres-mcp@sha256:dbbd346860d29f1543e991f30f3284bf4ab5f096d049ecc3426528f20b1b6e6b
    container_name: postgres-mcp
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      DATABASE_URI: "postgresql://ppe_user:ppe_password@postgresql:5432/ppe_tracking"
    command: ["--access-mode=restricted", "--transport=sse"]
    ports:
      - "8000:8000"
    networks:
      - ppe
    pull_policy: missing

  # Label Studio annotation UI (uses the same PostgreSQL and MinIO services)
  labelstudio:
    image: docker.io/heartexlabs/label-studio@sha256:aa461572e8f9d86a1bf9520c1db620204e86160fd2f80dd7e9d40ac84a8828ea
    container_name: labelstudio
    depends_on:
      postgresql:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DJANGO_DB: default
      POSTGRE_HOST: postgresql
      POSTGRE_PORT: "5432"
      POSTGRE_NAME: ppe_tracking
      POSTGRE_USER: ppe_user
      POSTGRE_PASSWORD: ppe_password
    ports:
      - "8082:8080"
    volumes:
      - labelstudio_data:/label-studio/data
    networks:
      - ppe
    pull_policy: missing

  # RTSP server for video streaming (MP4 simulation or real camera proxy)
  video-stream:
    image: docker.io/bluenviron/mediamtx@sha256:9e39256d1ba35f0063700c6f62dd32e6db4592ddd9560d78f409ec451d79b1d8
    container_name: video-stream
    environment:
      MTX_WRITEQUEUESIZE: "2048"
      MTX_UDPREADBUFFERSIZE: "4194304"
    ports:
      - "8554:8554"
    networks:
      - ppe
    pull_policy: missing

  # FFmpeg publisher: downloads MP4 from MinIO and streams to MediaMTX
  video-stream-ffmpeg:
    build:
      context: ../../app
      dockerfile: video-stream-image/Dockerfile
    image: ppe-compliance-monitor-video-stream:local
    depends_on:
      data-loader:
        condition: service_completed_successfully
      video-stream:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_VIDEO_BUCKET: data
      MINIO_VIDEO_KEY: combined-video-no-gap-rooftop.mp4
      MEDIAMTX_HOST: video-stream
      MEDIAMTX_PORT: "8554"
    networks:
      - ppe
    restart: unless-stopped

  # Init service: uploads model and video files to MinIO (idempotent)
  data-loader:
    build:
      context: ../../app
      dockerfile: data-image/Dockerfile
    image: ppe-compliance-monitor-data:local
    pull_policy: missing
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      RUNTIME_TYPE: openvino
    networks:
      - ppe

  backend:
    build:
      context: ../../app/backend
      dockerfile: Dockerfile
    image: ppe-compliance-monitor-backend:local
    command: ["app.py"]
    pull_policy: missing
    depends_on:
      data-loader:
        condition: service_completed_successfully
      video-stream:
        condition: service_started
      minio:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      postgres-mcp:
        condition: service_started
    environment:
      CORS_ORIGINS: "http://localhost:3000,http://0.0.0.0:3000,http://127.0.0.1:3000"
      POSTGRES_MCP_URL: "http://postgres-mcp:8000/sse"
      # MinIO configuration
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_VIDEO_BUCKET: data
      # model_name comes from app_config; tensor input/version overrides optional
      MODEL_INPUT_NAME: "x"
      MODEL_VERSION: "1"
      # PostgreSQL database connection
      DB_HOST: postgresql
      DB_PORT: "5432"
      DB_NAME: ppe_tracking
      DB_USER: ppe_user
      DB_PASSWORD: ppe_password
      LOG_LEVEL: "INFO"
      OPENAI_API_TOKEN: "${OPENAI_API_TOKEN}"
      OPENAI_API_ENDPOINT: "${OPENAI_API_ENDPOINT}"
      OPENAI_MODEL: "${OPENAI_MODEL}"
      OPENAI_TEMPERATURE: "${OPENAI_TEMPERATURE:-0.7}"
      # Config storage: MinIO (enables horizontal scaling)
      CONFIG_BUCKET: config
      DEFAULT_OVMS_MODEL_URL: "ovms:8081"
      PHOENIX_COLLECTOR_ENDPOINT: "http://phoenix:4317"
      # INFERENCE_WORKERS: "2"
    ports:
      - "8888:8888"
    networks:
      - ppe

  backend-eval:
    build:
      context: ../../app/evals
      dockerfile: Containerfile
    image: ppe-compliance-monitor-evals:local
    environment:
      BACKEND_URL: "http://backend:8888"
      EVAL_DATASET: "${EVAL_DATASET:-ppe}"
      SNAPSHOT_DIR: "/snapshots"
      OPENAI_API_TOKEN: "${OPENAI_API_TOKEN}"
      OPENAI_API_ENDPOINT: "${OPENAI_API_ENDPOINT}"
      OPENAI_MODEL: "${OPENAI_MODEL}"
      OPENAI_TEMPERATURE: "${OPENAI_TEMPERATURE:-0.7}"
      DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
      DB_HOST: postgresql
      DB_PORT: "5432"
      DB_NAME: ppe_tracking
      DB_USER: ppe_user
      DB_PASSWORD: ppe_password
    volumes:
      - eval_snapshots:/snapshots
    networks:
      - ppe
    profiles:
      - eval
    pull_policy: missing


  phoenix:
    image: docker.io/arizephoenix/phoenix@sha256:21d06ca8f3a690652389e6cd2c3f59e83bedfb16cf8881629e7df5965c7dd0e0
    container_name: phoenix
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      PHOENIX_WORKING_DIR: /mnt/data
    volumes:
      - phoenix_data:/mnt/data
    networks:
      - ppe
    pull_policy: missing

  init-eval-db:
    image: docker.io/library/python@sha256:233de06753d30d120b1a3ce359d8d3be8bda78524cd8f520c99883bfe33964cf
    command: sh -c "pip install -q psycopg2-binary && python /evals/init_db.py"
    pull_policy: missing
    working_dir: /evals
    environment:
      DB_HOST: postgresql
      DB_PORT: "5432"
      DB_NAME: ppe_tracking
      DB_USER: ppe_user
      DB_PASSWORD: ppe_password
    volumes:
      - ../../app/evals:/evals:z
    networks:
      - ppe
    profiles:
      - eval

  frontend:
    build:
      context: ../../app/frontend
      dockerfile: Dockerfile
    image: ppe-compliance-monitor-frontend:local
    depends_on:
      - backend
    networks:
      - ppe
    environment:
      FRONTEND_API_URL: "http://localhost:8888/api"
    command:
      - sh
      - -c
      - >
        printf "window.__ENV__ = { API_URL: \"%s\" };\n" "$${FRONTEND_API_URL}" > /app/build/env.js && serve -s /app/build -l tcp://0.0.0.0:3000 #magic___^_^___line
    ports:
      - "3000:3000"
    pull_policy: missing

  # Export each app/models/*.pt → /models/ovms/<name>/1/*.xml + ovms/config.json for OVMS
  yolo-model-prep:
    image: docker.io/ultralytics/ultralytics@sha256:6ec3f66f0e1a8a14d6410d8e395296005ff68966179a5856df7dec70f0d5b277
    environment:
      OVMS_CONFIG_NIREQ: "8"
      OVMS_CONFIG_PLUGIN_CONFIG: '{"PERFORMANCE_HINT": "THROUGHPUT", "ENABLE_CPU_PINNING": false}'
      OVMS_CONFIG_SHAPE: '{"x":"(-1,3,640,640)"}'
    pull_policy: missing
    volumes:
      - ../../app/models:/source:ro,z
      - model_repo:/models:z
      - ./yolo-model-prep.sh:/prep.sh:ro,z
      - ../../app/data-image/export_models.py:/export_models/export_models.py:ro,z
    entrypoint: ["bash", "/prep.sh"]
    networks:
      - ppe

  # ── OpenVINO Model Server (multi-model via config.json) ──
  ovms:
    image: docker.io/openvino/model_server@sha256:471362689b24d2e1824d4d2bddaea2e1e2908259d03eab7bd39179d9b0f7422c
    depends_on:
      yolo-model-prep:
        condition: service_completed_successfully
    pull_policy: missing
    restart: on-failure
    command:
      - --config_path
      - /models/ovms/config.json
      - --port
      - "8081"
      - --rest_port
      - "8080"
    ports:
      - "8081:8081"
      - "8080:8080"
    volumes:
      - model_repo:/models:z
    networks:
      - ppe
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v2/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  minio_data:
  postgres_data:
  labelstudio_data:
  model_repo:
  eval_snapshots:
  phoenix_data:
