name: Backend Tests

on:
  workflow_dispatch:
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - 'app/backend/**'
  #     - '.github/workflows/test-backend.yml'
  push:
    branches: [main]
    paths:
      - 'app/backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: docker.io/library/postgres:16-alpine
        env:
          POSTGRES_DB: ppe_tracking
          POSTGRES_USER: ppe_user
          POSTGRES_PASSWORD: ppe_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ppe_user -d ppe_tracking" --health-interval 5s --health-timeout 5s --health-retries 10 --health-start-period 5s
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: ppe_tracking
      DB_USER: ppe_user
      DB_PASSWORD: ppe_password

    steps:
      - uses: actions/checkout@v4

      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: apt-libgl-${{ runner.os }}

      - name: Install system dependencies
        run: apt-get update && apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v4

      - name: Cache venv
        uses: actions/cache@v4
        with:
          path: app/backend/.venv
          key: venv-${{ runner.os }}-py3.11-${{ hashFiles('app/backend/uv.lock') }}

      - name: Install dependencies
        working-directory: app/backend
        run: uv sync --group dev

      - name: Run tests
        working-directory: app/backend
        run: uv run python -m pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}/app/backend:${{ github.workspace }}/app/backend/tests
          POSTGRES_MCP_URL: "http://localhost:9999/sse"
